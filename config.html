<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NuEVI Config</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="config.css">
  <link rel="icon" href="favicon.ico" sizes="16x16 32x32 48x48 64x64" type="image/x-icon">
</head>
<body>
  <div id="app">
    <h1>NuEVI Config</h1>
    <div class="error-banner" v-if="loadError">{{ loadError }}</div>

    <div class="meta">
      <div class="meta-row">
        <input class="meta-name" type="text" v-model="configName" placeholder="Config name" @input="touch">
        <div class="meta-actions">
          <button @click="triggerLoad">Load</button>
          <button @click="saveConfig">Save JSON</button>
          <button @click="saveMidi">Save MIDI</button>
          <button @click="saveSyx">Save SysEx</button>
          <input ref="fileInput" type="file" accept=".json,.mid,.syx" style="display:none" @change="loadFile">
        </div>
      </div>
      <textarea class="meta-comment" v-model="configComment" placeholder="Comment" rows="2" @input="touch"></textarea>
      <div class="meta-timestamp" v-if="timeCreated">Last edited: {{ timeCreated }}</div>
    </div>

    <div class="warn-banner" v-if="loadWarnings.length">
      <div v-for="w in loadWarnings" :key="w">{{ w }}</div>
    </div>

    <template v-for="section in sections" :key="section.name">
      <template v-if="sectionVisible(section)">
        <h2 class="section-heading" @click="section._collapsed = !section._collapsed">
          <span class="section-chevron">{{ section._collapsed ? '▶' : '▼' }}</span>
          {{ section.name }}
        </h2>
        <div class="section-items" v-show="!section._collapsed">
          <div
            v-for="(item, id) in section.items"
            :key="id"
            class="item"
            :class="{ invalid: item._error }"
            v-show="itemVisible(item)"
          >
            <div class="item-row">
              <div class="item-left">
                <span class="item-label">{{ item.friendlyName || id }}</span>
                <span class="item-id" v-if="item.friendlyName">{{ id }}</span>
              </div>
              <div class="item-right" v-if="!bitfieldBits(item)">
                <template v-if="selectOptions(item)">
                  <select
                    :value="item._raw"
                    @change="item._raw = $event.target.value"
                  >
                    <option
                      v-for="opt in selectOptions(item)"
                      :key="opt.value"
                      :value="String(opt.value)"
                    >{{ opt.label }}</option>
                  </select>
                </template>
                <template v-else>
                  <span class="item-range">{{ itemRangeText(item) }}</span>
                  <input
                    type="text"
                    inputmode="numeric"
                    v-model="item._raw"
                    @input="validate(item)"
                    @blur="validate(item); normalize(item)"
                  >
                  <div class="item-stepper">
                    <button @click="step(item, 1)">▲</button>
                    <button @click="step(item, -1)">▼</button>
                  </div>
                  <span class="item-error" v-if="item._error">{{ item._error }}</span>
                </template>
              </div>
            </div>
            <div class="item-bitfield" v-if="bitfieldBits(item)">
              <div class="item-bitfield-spacer"></div>
              <div class="item-bitfield-checks">
                <label
                  v-for="bf in bitfieldBits(item)"
                  :key="bf.bit"
                  class="bitfield-row"
                >
                  <input
                    type="checkbox"
                    :checked="getBit(item, bf.bit)"
                    @change="setBit(item, bf.bit, $event.target.checked)"
                  >
                  {{ bf.label }}
                </label>
              </div>
            </div>
            <input
              v-if="item.uiModel === 'slider'"
              type="range"
              class="item-slider"
              :min="item.min"
              :max="item.max"
              :value="sliderValue(item)"
              @input="setSlider(item, $event.target.value)"
            >
          </div>
        </div>
      </template>
    </template>
  </div>

  <script>
    const { createApp, reactive, ref, computed } = Vue;

    // ── Sysex / MIDI file constants ──────────────────────────────────────────
    const SYSEX_VENDOR      = [0x00, 0x3E, 0x7F];
    const SYSEX_HEADER      = 'NuEVIc01';
    const SYSEX_HEADER_LEN  = 3 + 8 + 2;  // vendor + command + payloadSize field = 13
    const SYSEX_CRC_LEN     = 4;
    const sysexTotalLen = payloadSize => SYSEX_HEADER_LEN + payloadSize + SYSEX_CRC_LEN;

    // CRC32 (IEEE 802.3 / zlib polynomial, same as the device)
    function crc32(data) {
      let crc = 0xFFFFFFFF;
      for (let i = 0; i < data.length; i++) {
        crc ^= data[i];
        for (let j = 0; j < 8; j++) {
          crc = (crc >>> 1) ^ (0xEDB88320 & -(crc & 1));
        }
      }
      return (~crc) >>> 0;
    }

    // Encode a 14-bit value as two 7-bit MIDI bytes [MSB, LSB]
    function toMidiU16(val) {
      return [(val >> 7) & 0x7F, val & 0x7F];
    }

    // Decode two 7-bit MIDI bytes back to a 14-bit value
    function fromMidiU16(b0, b1) {
      return ((b0 & 0x7F) << 7) | (b1 & 0x7F);
    }

    // Encode a crc32 uint32 as 4 MIDI-safe bytes (big-endian, MSB of each byte stripped)
    function toMidiCRC(crc) {
      return [(crc >>> 24) & 0x7F, (crc >>> 16) & 0x7F, (crc >>> 8) & 0x7F, crc & 0x7F];
    }

    // Build the sysex payload from the current section data.
    // Payload size = (max visible item address + 2), matching the device's own logic.
    function buildSysexData(sections, isVisible, getOffset) {
      // Find highest address among visible items
      let maxAddr = 0;
      for (const section of sections)
        for (const item of Object.values(section.items))
          if (isVisible(item)) maxAddr = Math.max(maxAddr, item.address + 2);
      const payloadSize = maxAddr;

      const buf = new Uint8Array(sysexTotalLen(payloadSize)); // zero-initialised

      // Vendor ID
      buf[0] = 0x00; buf[1] = 0x3E; buf[2] = 0x7F;

      // Header "NuEVIc01"
      for (let i = 0; i < 8; i++) buf[3 + i] = SYSEX_HEADER.charCodeAt(i);

      // Payload size field
      const [ps0, ps1] = toMidiU16(payloadSize);
      buf[11] = ps0; buf[12] = ps1;

      // Config values (payload starts at byte 13)
      const payloadBase = 13;
      for (const section of sections) {
        for (const item of Object.values(section.items)) {
          if (!isVisible(item)) continue;
          const offset = getOffset(item);
          const n = parseInt(item._raw, 10);
          if (isNaN(n)) continue;
          const stored = n + offset;
          const [b0, b1] = toMidiU16(stored);
          buf[payloadBase + item.address]     = b0;
          buf[payloadBase + item.address + 1] = b1;
        }
      }

      // CRC32 over everything before the checksum field
      const checksumPos = payloadBase + payloadSize;
      const crcBytes = toMidiCRC(crc32(buf.subarray(0, checksumPos)));
      buf[checksumPos]     = crcBytes[0];
      buf[checksumPos + 1] = crcBytes[1];
      buf[checksumPos + 2] = crcBytes[2];
      buf[checksumPos + 3] = crcBytes[3];

      return buf;
    }

    // Parse a NuEVI sysex payload (variable length).
    // Returns { version, values: { address: uint16 } } on success, or throws with a message.
    function parseSysexData(data) {
      if (data.length < SYSEX_HEADER_LEN + SYSEX_CRC_LEN)
        throw new Error(`Sysex too short (${data.length} bytes)`);

      // Vendor ID — read but don't reject; caller may warn
      const vendorId = [data[0], data[1], data[2]];

      // Header
      const hdr = String.fromCharCode(...data.subarray(3, 11));
      if (hdr !== SYSEX_HEADER)
        throw new Error(`Unrecognised sysex command: ${hdr}`);

      // Payload size
      const payloadSize = fromMidiU16(data[11], data[12]);
      if (data.length < sysexTotalLen(payloadSize))
        throw new Error(`Sysex data truncated (have ${data.length} bytes, need ${sysexTotalLen(payloadSize)})`);

      // Checksum — NO_CHECKSUM magic = 0x7F007F00 little-endian → bytes [0x00, 0x7F, 0x00, 0x7F]
      const checksumPos = 13 + payloadSize;
      const noChecksum = data[checksumPos]===0x00 && data[checksumPos+1]===0x7F &&
                         data[checksumPos+2]===0x00 && data[checksumPos+3]===0x7F;
      let checksumWarning = null;
      if (noChecksum) {
        checksumWarning = 'File has no checksum (NO_CHECKSUM magic present).';
      } else {
        const expected = toMidiCRC(crc32(data.subarray(0, checksumPos)));
        const mismatch = expected.some((b, i) => data[checksumPos + i] !== b);
        if (mismatch) checksumWarning = 'Checksum mismatch — file may be corrupt.';
      }

      // Extract all values
      const payloadBase = 13;
      const values = {};
      for (let addr = 0; addr < payloadSize; addr += 2)
        values[addr] = fromMidiU16(data[payloadBase + addr], data[payloadBase + addr + 1]);

      return { version: values[0] ?? 0, values, checksumWarning, vendorId };
    }

    // Wrap 205-byte sysex payload in a minimal type-0 MIDI file.
    function buildMidiFile(sysexData) {
      function varLen(n) {
        if (n < 128) return [n];
        const out = [];
        let v = n;
        out.unshift(v & 0x7F);
        v >>= 7;
        while (v > 0) { out.unshift(0x80 | (v & 0x7F)); v >>= 7; }
        return out;
      }

      // Track event: delta(0) F0 <varlen> <sysexData> F7  +  end-of-track meta
      const vl = varLen(sysexData.length + 1); // +1 for the trailing F7
      const trackBytes = [
        0x00, 0xF0, ...vl, ...sysexData, 0xF7,
        0x00, 0xFF, 0x2F, 0x00,
      ];

      const trackLen = trackBytes.length;
      const file = new Uint8Array(14 + 8 + trackLen);
      let p = 0;

      // MThd: format 0, 1 track, 96 ticks/quarter
      for (const b of [0x4D,0x54,0x68,0x64, 0x00,0x00,0x00,0x06,
                        0x00,0x00, 0x00,0x01, 0x00,0x60]) file[p++] = b;

      // MTrk header + track data
      for (const b of [0x4D,0x54,0x72,0x6B]) file[p++] = b;
      file[p++] = (trackLen >>> 24) & 0xFF;
      file[p++] = (trackLen >>> 16) & 0xFF;
      file[p++] = (trackLen >>>  8) & 0xFF;
      file[p++] =  trackLen         & 0xFF;
      for (const b of trackBytes) file[p++] = b;

      return file;
    }

    // Scan raw bytes for the NuEVI sysex payload (variable length).
    // Matches on the command string "NuEVIc01" regardless of vendor ID.
    // Returns a Uint8Array slice or throws.
    function findSysexInMidi(bytes) {
      // Match on the 8-byte command string at offset 3 (after 3 vendor ID bytes)
      const cmd = [0x4E, 0x75, 0x45, 0x56, 0x49, 0x63, 0x30, 0x31]; // "NuEVIc01"
      const minLen = SYSEX_HEADER_LEN + SYSEX_CRC_LEN;
      outer: for (let i = 0; i <= bytes.length - minLen; i++) {
        for (let j = 0; j < cmd.length; j++) {
          if (bytes[i + 3 + j] !== cmd[j]) continue outer;
        }
        // Found — read payload size from header and extract the full block
        const payloadSize = fromMidiU16(bytes[i + 11], bytes[i + 12]);
        const totalLen = sysexTotalLen(payloadSize);
        if (i + totalLen > bytes.length) continue; // truncated, keep scanning
        return bytes.subarray(i, i + totalLen);
      }
      throw new Error('No NuEVI config sysex found in file');
    }

    // ── Vue app ──────────────────────────────────────────────────────────────
    createApp({
      setup() {
        const sections      = reactive([]);
        const loadError     = ref('');
        const loadWarnings  = ref([]);
        const configName    = ref('');
        const configComment = ref('');
        const timeCreated   = ref('');
        const fileInput     = ref(null);

        function getOffset(item) {
          const m = (item.dataModel || '').match(/^offset:(-?\d+)$/);
          return m ? parseInt(m[1], 10) : 0;
        }

        function toDisplay(storedVal, offset) {
          const d = storedVal - offset;
          return (offset !== 0 && d > 0) ? '+' + d : String(d);
        }

        fetch('config-items.json')
          .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
          .then(data => {
            for (const section of data) {
              const items = {};
              for (const [id, item] of Object.entries(section.items)) {
                const offset = getOffset(item);
                items[id] = { ...item, _raw: toDisplay(item.factoryDefault, offset), _error: '' };
              }
              sections.push({ name: section.name, items, _collapsed: false });
            }
          })
          .catch(e => { loadError.value = `Failed to load config-items.json: ${e.message}`; });

        function findItem(id) {
          for (const section of sections) {
            if (id in section.items) return section.items[id];
          }
          return null;
        }

        function findItemByAddress(addr) {
          for (const section of sections) {
            for (const item of Object.values(section.items)) {
              if (item.address === addr) return item;
            }
          }
          return null;
        }

        function touch() {
          timeCreated.value = new Date().toISOString();
        }

        const currentVersion = computed(() => {
          const item = findItem('VERSION');
          if (!item) return Infinity;
          const n = parseInt(item._raw, 10);
          return isNaN(n) ? Infinity : n;
        });

        function itemVisible(item) {
          return item.minVersion <= currentVersion.value;
        }

        function sectionVisible(section) {
          return Object.values(section.items).some(item => itemVisible(item));
        }

        function itemRangeText(item) {
          const offset = getOffset(item);
          return `${item.min - offset} – ${item.max - offset}`;
        }

        // Parse "select:v;label:v;label:..." → [{value, label}, ...]
        function selectOptions(item) {
          const m = (item.uiModel || '').match(/^select:(.+)$/);
          if (!m) return null;
          return m[1].split(':').map(part => {
            const semi = part.indexOf(';');
            return semi === -1
              ? { value: parseInt(part), label: part }
              : { value: parseInt(part.slice(0, semi)), label: part.slice(semi + 1) };
          });
        }

        // Parse "bitfield:bit;label:bit;label:..." → [{bit, label}, ...]
        function bitfieldBits(item) {
          const m = (item.uiModel || '').match(/^bitfield:(.+)$/);
          if (!m) return null;
          return m[1].split(':').map(part => {
            const semi = part.indexOf(';');
            return semi === -1
              ? { bit: parseInt(part), label: part }
              : { bit: parseInt(part.slice(0, semi)), label: part.slice(semi + 1) };
          });
        }

        function getBit(item, bit) {
          const val = parseInt(item._raw, 10);
          return !isNaN(val) && (val & (1 << bit)) !== 0;
        }

        function setBit(item, bit, checked) {
          let val = parseInt(item._raw, 10);
          if (isNaN(val)) val = 0;
          item._raw = String(checked ? val | (1 << bit) : val & ~(1 << bit));
        }

        function sliderValue(item) {
          const offset = getOffset(item);
          const n = parseInt(item._raw, 10);
          const stored = isNaN(n) ? item.factoryDefault : n + offset;
          return Math.min(item.max, Math.max(item.min, stored));
        }

        function setSlider(item, storedStr) {
          item._raw = toDisplay(parseInt(storedStr, 10), getOffset(item));
          validate(item);
        }

        function validate(item) {
          const offset = getOffset(item);
          const raw = item._raw.trim();
          const n = parseInt(raw, 10);
          if (raw === '' || isNaN(n) || !Number.isInteger(n)) {
            item._error = 'Must be an integer';
          } else if (n + offset < item.min || n + offset > item.max) {
            item._error = `Must be between ${item.min - offset} and ${item.max - offset}`;
          } else {
            item._error = '';
          }
          touch();
        }

        function step(item, delta) {
          const offset = getOffset(item);
          const n = parseInt(item._raw, 10);
          const stored = (isNaN(n) ? item.factoryDefault - offset : n) + offset;
          item._raw = toDisplay(Math.min(item.max, Math.max(item.min, stored + delta)), offset);
          validate(item);
        }

        function normalize(item) {
          if (item._error) return;
          const offset = getOffset(item);
          if (offset === 0) return;
          const n = parseInt(item._raw.trim(), 10);
          if (!isNaN(n)) item._raw = toDisplay(n + offset, offset);
        }

        // Reset all items to factory defaults, then apply address→value map.
        // Returns { version, extraNames } for warning generation.
        function applySysexValues(addrValues, fileVersion) {
          for (const section of sections) {
            for (const item of Object.values(section.items)) {
              item._raw = toDisplay(item.factoryDefault, getOffset(item));
              item._error = '';
            }
          }

          for (const [addrStr, val] of Object.entries(addrValues)) {
            const item = findItemByAddress(parseInt(addrStr));
            if (item) {
              item._raw = toDisplay(val, getOffset(item));
              validate(item);
            }
          }

          const extraNames = [];
          for (const section of sections) {
            for (const item of Object.values(section.items)) {
              if (item.address === 0) continue; // skip VERSION itself
              const inSysex = item.address in addrValues;
              if (inSysex && item.minVersion > fileVersion)
                extraNames.push(item.friendlyName || item.address);
            }
          }
          return extraNames;
        }

        // ── Load / save ──────────────────────────────────────────────────────

        function triggerLoad() {
          fileInput.value.value = '';
          fileInput.value.click();
        }

        function loadFile(event) {
          const file = event.target.files[0];
          if (!file) return;
          if (/\.(mid|syx)$/i.test(file.name)) {
            loadMidi(file);
          } else {
            loadJson(file);
          }
        }

        function loadJson(file) {
          const reader = new FileReader();
          reader.onload = e => {
            try {
              loadError.value = '';
              loadWarnings.value = [];
              const data = JSON.parse(e.target.result);
              configName.value    = data.info?.name ?? '';
              configComment.value = data.info?.comment ?? '';
              timeCreated.value   = data.info?.timeCreated ?? '';

              const fileConfig  = data.config ?? {};
              const fileVersion = fileConfig.VERSION ?? 0;

              for (const section of sections)
                for (const item of Object.values(section.items)) {
                  item._raw = toDisplay(item.factoryDefault, getOffset(item));
                  item._error = '';
                }

              for (const [id, value] of Object.entries(fileConfig)) {
                const item = findItem(id);
                if (item) { item._raw = toDisplay(value, getOffset(item)); validate(item); }
              }

              timeCreated.value = data.info?.timeCreated ?? timeCreated.value;

              const missingNames = [], extraNames = [];
              for (const section of sections) {
                for (const [id, item] of Object.entries(section.items)) {
                  if (id === 'VERSION') continue;
                  const inFile  = id in fileConfig;
                  const belongs = item.minVersion <= fileVersion;
                  if (belongs && !inFile) missingNames.push(item.friendlyName || id);
                  if (!belongs && inFile) extraNames.push(item.friendlyName || id);
                }
              }
              const warnings = [];
              if (missingNames.length)
                warnings.push(`${missingNames.length} item(s) missing from file, reset to factory defaults: ${missingNames.join(', ')}`);
              if (extraNames.length)
                warnings.push(`${extraNames.length} item(s) from a newer config version are loaded but hidden: ${extraNames.join(', ')}`);
              loadWarnings.value = warnings;
            } catch {
              loadError.value = 'Failed to parse JSON config file.';
            }
          };
          reader.readAsText(file);
        }

        function loadMidi(file) {
          const reader = new FileReader();
          reader.onload = e => {
            try {
              loadError.value = '';
              loadWarnings.value = [];
              const bytes = new Uint8Array(e.target.result);
              const sysexData = findSysexInMidi(bytes);
              const { version: fileVersion, values, checksumWarning, vendorId } = parseSysexData(sysexData);

              configName.value    = file.name.replace(/\.(mid|syx)$/i, '');
              configComment.value = '';

              const extraNames = applySysexValues(values, fileVersion);
              timeCreated.value = new Date().toISOString();

              const knownVendor = SYSEX_VENDOR.every((b, i) => b === vendorId[i]);
              const warnings = [];
              if (!knownVendor)
                warnings.push(`Unknown vendor ID: ${vendorId.map(b => b.toString(16).padStart(2,'0')).join(' ')} (expected 00 3e 7f)`);
              if (checksumWarning) warnings.push(checksumWarning);
              if (extraNames.length)
                warnings.push(`${extraNames.length} item(s) from a newer config version are loaded but hidden: ${extraNames.join(', ')}`);
              loadWarnings.value = warnings;
            } catch (err) {
              loadError.value = `Failed to load MIDI file: ${err.message}`;
            }
          };
          reader.readAsArrayBuffer(file);
        }

        function saveConfig() {
          const config = {};
          for (const section of sections)
            for (const [id, item] of Object.entries(section.items)) {
              if (!itemVisible(item)) continue;
              const n = parseInt(item._raw, 10);
              if (!isNaN(n)) config[id] = n + getOffset(item);
            }
          const data = {
            info: { name: configName.value, comment: configComment.value,
                    timeCreated: timeCreated.value || new Date().toISOString() },
            config,
          };
          download(JSON.stringify(data, null, 2), 'application/json',
                   (configName.value.trim() || 'nuevi-config') + '.json');
        }

        function saveMidi() {
          const sysexData = buildSysexData(sections, itemVisible, getOffset);
          const midiFile  = buildMidiFile(sysexData);
          download(midiFile, 'audio/midi',
                   (configName.value.trim() || 'nuevi-config') + '.mid');
        }

        function saveSyx() {
          const sysexData = buildSysexData(sections, itemVisible, getOffset);
          download(sysexData, 'application/octet-stream',
                   (configName.value.trim() || 'nuevi-config') + '.syx');
        }

        // ── Shared download helper ────────────────────────────────────────────

        function download(data, mime, filename) {
          const blob = new Blob([data], { type: mime });
          const url  = URL.createObjectURL(blob);
          const a    = document.createElement('a');
          a.href = url; a.download = filename; a.click();
          URL.revokeObjectURL(url);
        }

        return { sections, loadError, loadWarnings, configName, configComment, timeCreated,
                 fileInput,
                 touch, validate, normalize, sliderValue, setSlider, itemRangeText, selectOptions,
                 bitfieldBits, getBit, setBit,
                 itemVisible, sectionVisible, step,
                 triggerLoad, loadFile, saveConfig, saveMidi, saveSyx };
      }
    }).mount('#app');
  </script>
</body>
</html>
